# QXDC 2.0 — Configuração padrão
# Este arquivo define os valores base. Perfis em profiles/ podem sobrescrever.

packages:
  install:
    - apt-transport-https
    - curl
    - wget
    - git
    - htop
    - btop
    - net-tools
    - unzip
    - unrar
    - neofetch
    - lsb-release
    - gnome-disk-utility
    - keepassxc
    - galculator
    - menulibre
    - locate
    - software-properties-common
    - fonts-noto
    - fonts-noto-color-emoji
    - bash-completion
    - xclip
  purge:
    - mutt
    - hv3
    - imagemagick
    - xterm

desktop:
  gtk_theme: Arc-Dark
  wm_theme: Arc-Dark
  icons: Papirus-Dark
  papirus_folders_color: paleorange
  font: Noto Sans 10
  monospace_font: JetBrains Mono 10
  workspaces: 1
  thunar_location_bar: ThunarLocationButtons
  cursor_theme: Adwaita

apps:
  browser: firefox-esr
  browser_theme: arc
  editor: code
  terminal: xfce4-terminal
